<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aaria's Flying Elephant | Aaria's Blue Elephant</title>
<!-- © 2026 Aaria's Blue Elephant · aariasblueelephant.org
     Aaria's Flying Elephant — fly Nilu (big Dumbo ears and all!) through a
     dreamy sky of floating islands. Real-feel flight: bank into turns, dive
     to speed up, climbing slows you down, and the islands are SOLID — bump
     one and you bounce off softly. Gentle by design: nothing hurts, nothing
     fails, drifting through clouds is playing too. -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐘</text></svg>">
<link rel="stylesheet" href="../gamekit/kit.css">
<style>
  #fRings {
    position: fixed; top: calc(max(10px, env(safe-area-inset-top)) + 64px); left: max(10px, env(safe-area-inset-left));
    z-index: 40; background: var(--k-card); border-radius: 16px; padding: 8px 14px;
    font-weight: 900; font-size: 16px; box-shadow: 0 4px 12px rgba(40,40,90,.18);
  }
  #kToast { bottom: auto; top: calc(max(10px, env(safe-area-inset-top)) + 118px); }
</style>
</head>
<body>
<div id="kStage"></div>
<div id="fRings">⭐ 0/5</div>

<script src="lib/three.min.js"></script>
<script src="../gamekit/kit.js"></script>
<script>
(function () {
  "use strict";
  const K = window.ABEKit;
  const $ = (id) => document.getElementById(id);

  /* ---------- scene ---------- */
  let scene, camera, renderer, nilu, earL, earR, trunk, legs = [], eyes = [], tail;
  let rings = [], clouds = [], birds = [], pad, hintArrow, ocean, sun, shadowBlob;
  let falls = [], streaks = [], bursts = [];
  const ISLES = [];               // solid colliders: {x,y,z,r,g,topY}
  const OCEAN_Y = -7;

  function emojiSprite(emoji, scale) {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const g = c.getContext('2d');
    g.font = '102px serif'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(emoji, 64, 70);
    const t = new THREE.CanvasTexture(c);
    const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: t, transparent: true }));
    s.scale.set(scale, scale, 1); return s;
  }
  function glowSprite(inner, outer, scale) {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const g = c.getContext('2d');
    const gr = g.createRadialGradient(64, 64, 4, 64, 64, 62);
    gr.addColorStop(0, inner); gr.addColorStop(1, outer);
    g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(c), transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    s.scale.set(scale, scale, 1); return s;
  }

  /* dreamy vertical-gradient sky dome (replaces the flat background color) */
  function buildSky() {
    const c = document.createElement('canvas'); c.width = 16; c.height = 512;
    const g = c.getContext('2d');
    const gr = g.createLinearGradient(0, 0, 0, 512);
    gr.addColorStop(0.00, '#2e6fd6'); gr.addColorStop(0.42, '#7ec8ff');
    gr.addColorStop(0.72, '#cfeaff'); gr.addColorStop(1.00, '#ffe6cf');
    g.fillStyle = gr; g.fillRect(0, 0, 16, 512);
    const dome = new THREE.Mesh(
      new THREE.SphereGeometry(380, 24, 18),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), side: THREE.BackSide, fog: false }));
    scene.add(dome);
    sun = glowSprite('rgba(255,250,220,1)', 'rgba(255,220,140,0)', 90);
    sun.material.fog = false;
    sun.position.set(150, 150, -280); scene.add(sun);
  }

  /* soft animated ocean far below — gives the sky real depth */
  function buildOcean() {
    const c = document.createElement('canvas'); c.width = c.height = 256;
    const g = c.getContext('2d');
    g.fillStyle = '#3b8fd9'; g.fillRect(0, 0, 256, 256);
    g.strokeStyle = 'rgba(255,255,255,0.28)'; g.lineWidth = 2;
    for (let i = 0; i < 34; i++) {
      const y = Math.random() * 256, x = Math.random() * 256, w = 14 + Math.random() * 30;
      g.beginPath(); g.moveTo(x, y);
      g.quadraticCurveTo(x + w / 2, y - 4, x + w, y); g.stroke();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(14, 14);
    ocean = new THREE.Mesh(new THREE.CircleGeometry(420, 40),
      new THREE.MeshLambertMaterial({ map: tex, color: 0x9fd4ff }));
    ocean.rotation.x = -Math.PI / 2; ocean.position.y = OCEAN_Y;
    scene.add(ocean);
  }

  /* Nilu v2 — rounder, leggier, blinkier. BIG ears are still the whole point. */
  function buildNilu() {
    const g = new THREE.Group();
    const blue = new THREE.MeshLambertMaterial({ color: 0x6db9f2 });
    const blueLight = new THREE.MeshLambertMaterial({ color: 0x8fcdf8 });
    const pink = new THREE.MeshLambertMaterial({ color: 0xf7c8dc });
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.85, 24, 18), blue);
    body.scale.set(1, 0.92, 1.28); g.add(body);
    const belly = new THREE.Mesh(new THREE.SphereGeometry(0.62, 18, 14), blueLight);
    belly.scale.set(0.95, 0.75, 1.1); belly.position.set(0, -0.28, 0.28); g.add(belly);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.68, 24, 18), blue);
    head.position.set(0, 0.46, 1.08); g.add(head);
    // BIG Dumbo ears — separate pivots so they can flap like wings
    const earGeo = new THREE.CircleGeometry(1.25, 28);
    // emissive lift: Lambert back-faces get no light in r128, and the chase cam
    // mostly sees the BACKS of the ears — without this they render near-black
    const earBlue = new THREE.MeshLambertMaterial({ color: 0x6db9f2, emissive: 0x2f5c86, side: THREE.DoubleSide });
    earL = new THREE.Group(); earR = new THREE.Group();
    const eL = new THREE.Mesh(earGeo, earBlue); eL.scale.set(0.82, 1.3, 1); eL.position.x = -1.2;
    const eLi = new THREE.Mesh(new THREE.CircleGeometry(0.95, 28), pink);
    eLi.scale.set(0.78, 1.22, 1); eLi.position.set(-1.2, 0, 0.035);
    earL.add(eL, eLi); earL.position.set(-0.38, 0.6, 1.02); earL.rotation.y = 0.3; earL.rotation.x = -0.12;
    const eR = eL.clone(); eR.position.x = 1.2;
    const eRi = eLi.clone(); eRi.position.x = 1.2;
    earR.add(eR, eRi); earR.position.set(0.38, 0.6, 1.02); earR.rotation.y = -0.3; earR.rotation.x = -0.12;
    g.add(earL, earR);
    trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.17, 0.95, 10), blue);
    trunk.position.set(0, 0.06, 1.68); trunk.rotation.x = 1.15; g.add(trunk);
    // proper eyes: white + pupil + sparkle, and they blink
    const white = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const dark = new THREE.MeshBasicMaterial({ color: 0x2a2a3a });
    for (const s of [-1, 1]) {
      const eye = new THREE.Group();
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 10), white);
      const p = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), dark);
      p.position.set(0, 0.01, 0.07);
      const hl = new THREE.Mesh(new THREE.SphereGeometry(0.02, 6, 6), white);
      hl.position.set(0.025, 0.045, 0.11);
      eye.add(w, p, hl); eye.position.set(0.26 * s, 0.64, 1.6); g.add(eye);
      eyes.push(eye);
      const cheek = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), pink);
      cheek.scale.set(1, 0.7, 0.5); cheek.position.set(0.4 * s, 0.42, 1.6); g.add(cheek);
    }
    // little red cap with a yellow pom, a nod to the circus flyer
    const cap = new THREE.Mesh(new THREE.ConeGeometry(0.27, 0.32, 12), new THREE.MeshLambertMaterial({ color: 0xe05a5a }));
    cap.position.set(0, 1.1, 1.02); g.add(cap);
    const pom = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshLambertMaterial({ color: 0xffd43b }));
    pom.position.set(0, 1.28, 1.02); g.add(pom);
    // stubby dangling legs
    for (const [sx, sz] of [[-0.42, 0.5], [0.42, 0.5], [-0.42, -0.5], [0.42, -0.5]]) {
      const leg = new THREE.Group();
      const l = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.19, 0.5, 10), blue);
      l.position.y = -0.25;
      const foot = new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 8), blueLight);
      foot.scale.set(1, 0.55, 1); foot.position.y = -0.5;
      leg.add(l, foot); leg.position.set(sx, -0.62, sz);
      g.add(leg); legs.push(leg);
    }
    tail = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.02, 0.55, 6), blue);
    tail.position.set(0, 0.12, -1.2); tail.rotation.x = -0.8; g.add(tail);
    const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), pink);
    tuft.position.set(0, -0.08, -1.42); g.add(tuft);
    return g;
  }

  /* islands v2: craggy rock, rounded lawn, trees, flowers — and SOLID */
  function island(x, y, z, r, colorTop, opts) {
    const g = new THREE.Group();
    const rockGeo = new THREE.ConeGeometry(r * 0.85, r * 1.9, 9, 4);
    const pos = rockGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {              // craggy vertex jitter
      const jy = pos.getY(i);
      if (Math.abs(jy) < r * 0.9) {
        pos.setX(i, pos.getX(i) * (1 + Math.sin(i * 12.9898) * 0.13));
        pos.setZ(i, pos.getZ(i) * (1 + Math.sin(i * 78.233) * 0.13));
      }
    }
    rockGeo.computeVertexNormals();
    const rock = new THREE.Mesh(rockGeo, new THREE.MeshLambertMaterial({ color: 0xa78868, flatShading: true }));
    rock.rotation.x = Math.PI; rock.position.y = -r * 1.05;
    const lawn = new THREE.Mesh(new THREE.SphereGeometry(r, 20, 12),
      new THREE.MeshLambertMaterial({ color: colorTop }));
    lawn.scale.set(1, 0.28, 1);
    const skirt = new THREE.Mesh(new THREE.CylinderGeometry(r, r * 0.88, r * 0.32, 18),
      new THREE.MeshLambertMaterial({ color: colorTop }));
    skirt.position.y = -r * 0.16;
    g.add(rock, lawn, skirt);
    for (let i = 0; i < 2 + (r > 6 ? 1 : 0); i++) {    // little pine trees
      const a = i * 2.4 + r, tr = r * (0.35 + i * 0.18);
      const tree = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.12, r * 0.28, 8),
        new THREE.MeshLambertMaterial({ color: 0x8a6a4a }));
      stem.position.y = r * 0.14;
      const c1 = new THREE.Mesh(new THREE.ConeGeometry(r * 0.22, r * 0.5, 9),
        new THREE.MeshLambertMaterial({ color: 0x4da96a }));
      c1.position.y = r * 0.44;
      const c2 = new THREE.Mesh(new THREE.ConeGeometry(r * 0.16, r * 0.4, 9),
        new THREE.MeshLambertMaterial({ color: 0x5fbf72 }));
      c2.position.y = r * 0.66;
      tree.add(stem, c1, c2);
      tree.position.set(Math.cos(a) * tr, r * 0.16, Math.sin(a) * tr);
      g.add(tree);
    }
    for (let i = 0; i < 4; i++) {                       // flowers on the lawn
      const f = emojiSprite(['🌼', '🌸', '🌷'][i % 3], 0.9);
      const a = i * 1.7 + r * 2;
      f.position.set(Math.cos(a) * r * 0.55, r * 0.3, Math.sin(a) * r * 0.55);
      g.add(f);
    }
    if (opts && opts.waterfall) {                       // waterfall into the clouds
      const c = document.createElement('canvas'); c.width = 32; c.height = 128;
      const wg = c.getContext('2d');
      wg.fillStyle = 'rgba(190,225,255,0.75)'; wg.fillRect(0, 0, 32, 128);
      wg.fillStyle = 'rgba(255,255,255,0.9)';
      for (let i = 0; i < 9; i++) wg.fillRect(3 + (i * 7) % 26, (i * 31) % 128, 3, 22);
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      const fall = new THREE.Mesh(new THREE.PlaneGeometry(r * 0.34, r * 1.7),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false }));
      fall.position.set(r * 0.8, -r * 0.75, 0); fall.rotation.y = Math.PI / 2;
      g.add(fall); falls.push(tex);
      const mist = glowSprite('rgba(255,255,255,0.85)', 'rgba(255,255,255,0)', r * 0.8);
      mist.position.set(r * 0.8, -r * 1.6, 0); g.add(mist);
    }
    g.position.set(x, y, z);
    scene.add(g);
    ISLES.push({ x, y: y - r * 0.35, z, r: r * 1.12, g, topY: y + r * 0.28 });
    return g;
  }

  function makeRing(x, y, z) {
    const g = new THREE.Group();
    const torus = new THREE.Mesh(new THREE.TorusGeometry(2.4, 0.24, 14, 40),
      new THREE.MeshLambertMaterial({ color: 0xffd43b, emissive: 0x9a7a00 }));
    g.add(torus);
    const glow = glowSprite('rgba(255,225,120,0.55)', 'rgba(255,215,100,0)', 8);
    g.add(glow);
    const star = emojiSprite('⭐', 1.6); star.position.y = 3.2; g.add(star);
    g.position.set(x, y, z);
    g.userData = { got: false, torus, star, glow };
    scene.add(g);
    return g;
  }

  /* a soft golden particle burst when a ring is collected */
  function burstAt(x, y, z) {
    const n = 26, posArr = new Float32Array(n * 3), vel = [];
    for (let i = 0; i < n; i++) {
      posArr[i * 3] = x; posArr[i * 3 + 1] = y; posArr[i * 3 + 2] = z;
      const a = (i / n) * Math.PI * 2, b = Math.random() * Math.PI - Math.PI / 2;
      vel.push([Math.cos(a) * Math.cos(b) * 7, Math.sin(b) * 7 + 2, Math.sin(a) * Math.cos(b) * 7]);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xffe066, size: 0.5, transparent: true, opacity: 1, depthWrite: false,
    }));
    scene.add(pts);
    bursts.push({ pts, vel, life: 0.9 });
  }

  const RING_SETS = [
    [[0, 14, -30], [8, 17, -55], [-4, 20, -82], [-14, 16, -110], [0, 22, -140]],
    [[10, 15, -30], [20, 20, -60], [8, 26, -90], [-8, 22, -118], [-20, 17, -148]],
    [[-8, 16, -28], [-16, 22, -58], [0, 28, -88], [16, 24, -116], [24, 18, -146]],
  ];

  function buildWorld() {
    scene.add(new THREE.HemisphereLight(0xbfe3ff, 0x8fb28a, 0.75));
    const sunL = new THREE.DirectionalLight(0xfff2d8, 0.85);
    sunL.position.set(60, 90, -40); scene.add(sunL);
    buildSky(); buildOcean();
    // sky islands scattered along the flight path — SOLID, you bounce off
    island(-18, 2, -40, 6, 0x8fd694, { waterfall: true });
    island(15, -2, -75, 8, 0x9ad0a5);
    island(-25, 5, -110, 5, 0xd8b4e2);
    island(20, 0, -135, 7, 0x8fd694, { waterfall: true });
    island(35, 8, -60, 4, 0xf3c88f);
    island(-40, 0, -80, 6, 0x9ad0a5);
    // the rainbow landing island, past the last ring
    pad = island(0, 12, -170, 9, 0xffb3c8);
    const bow = new THREE.Mesh(new THREE.TorusGeometry(5, 0.5, 10, 30, Math.PI),
      new THREE.MeshLambertMaterial({ color: 0xb197fc }));
    bow.position.y = 3.2; pad.add(bow);
    const flag = emojiSprite('🌈', 4); flag.position.y = 8.5; pad.add(flag);
    // puffy clouds (soft — flying through them is part of the fun)
    const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0x6f7887, transparent: true, opacity: 0.88 });
    for (let i = 0; i < 26; i++) {
      const cl = new THREE.Group();
      const puffs = 4 + (i % 3);
      for (let b = 0; b < puffs; b++) {
        const puff = new THREE.Mesh(new THREE.SphereGeometry(1.3 + Math.random() * 1.6, 10, 8), cloudMat);
        puff.scale.y = 0.62;
        puff.position.set(b * 1.7 - puffs * 0.85, Math.random() * 0.7, (Math.random() - 0.5) * 1.6);
        cl.add(puff);
      }
      cl.position.set((Math.random() - 0.5) * 130, 8 + Math.random() * 24, -Math.random() * 190);
      scene.add(cl); clouds.push(cl);
    }
    // friendly birds to trumpet at
    for (let i = 0; i < 7; i++) {
      const b = emojiSprite('🕊️', 1.6);
      b.position.set((Math.random() - 0.5) * 60, 12 + Math.random() * 14, -20 - Math.random() * 130);
      b.userData = { t: Math.random() * 9 };
      scene.add(b); birds.push(b);
    }
    // wind streaks: thin lines that appear as you speed up
    for (let i = 0; i < 16; i++) {
      const s = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 2.6),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 }));
      scene.add(s); streaks.push({ m: s, off: [(Math.random() - 0.5) * 16, (Math.random() - 0.5) * 9, -Math.random() * 26 - 4] });
    }
    // Nilu's soft blob shadow — grounds her against ocean and lawns
    shadowBlob = new THREE.Mesh(new THREE.CircleGeometry(1.5, 20),
      new THREE.MeshBasicMaterial({ color: 0x1a2a4a, transparent: true, opacity: 0.15, depthWrite: false }));
    shadowBlob.rotation.x = -Math.PI / 2; scene.add(shadowBlob);
    hintArrow = emojiSprite('⭐', 1.2);
    hintArrow.visible = false; scene.add(hintArrow);
  }

  function spawnRings() {
    for (const r of rings) scene.remove(r);
    rings = [];
    const set = RING_SETS[G.course % RING_SETS.length];
    for (const [x, y, z] of set) rings.push(makeRing(x, y, z));
    G.got = 0;
    $('fRings').textContent = '⭐ ' + G.got + '/' + rings.length;
  }

  /* ---------- flight model v2: bank to turn, trade height for speed ---------- */
  const F = {
    cruise: 9, min: 4.5, max: 17,
    gravity: 7.0,       // how strongly dives gain / climbs bleed speed
    drag: 0.6,          // pull back toward cruise
    rollMax: 0.8, rollEase: 3.4,
    yawFromRoll: 1.25,  // bank-to-turn: steeper bank = tighter turn
    pitchMax: 0.62, pitchEase: 2.8,
  };
  const P = { x: 0, y: 14, z: 8, yaw: 0, pitch: 0, roll: 0, sp: F.cruise };
  const G = { course: 0, stars: 0, got: 0, flying: true, landT: 0, shake: 0, bumpCd: 0 };

  function fly(dt) {
    if (!G.flying) { // resting on the rainbow island
      G.landT += dt;
      if (K.joy.active && K.joy.z < -0.4) takeOff();
      return;
    }
    // stick right → Nilu banks right → the bank carries her into the turn
    const targetRoll = K.joy.x * F.rollMax;
    P.roll += (targetRoll - P.roll) * Math.min(1, dt * F.rollEase);
    P.yaw -= P.roll * F.yawFromRoll * dt * (0.4 + 0.6 * P.sp / F.cruise);
    // stick up → nose up; pitch settles back to level on its own
    const targetPitch = -K.joy.z * F.pitchMax;
    P.pitch += (targetPitch - P.pitch) * Math.min(1, dt * F.pitchEase);
    // energy: dive to speed up, climb to slow down — like a real glider
    P.sp += (-Math.sin(P.pitch) * F.gravity - F.drag * (P.sp - F.cruise)) * dt;
    // too slow to climb? the nose gently mushes down (soft, never scary)
    if (P.sp < F.min + 1 && P.pitch > 0) P.pitch -= dt * (F.min + 1 - P.sp) * 0.5;
    P.sp = Math.max(F.min, Math.min(F.max, P.sp));
    const sp = P.sp * K.speed() * (K.calm() ? 0.85 : 1);
    const hs = sp * Math.cos(P.pitch);
    P.x -= Math.sin(P.yaw) * hs * dt;
    P.z -= Math.cos(P.yaw) * hs * dt;
    P.y += Math.sin(P.pitch) * sp * dt;
    // the ocean sprays you back up; the high sky gently levels you off
    if (P.y < OCEAN_Y + 5) { P.y = OCEAN_Y + 5; if (P.pitch < 0) P.pitch = 0.12; }
    if (P.y > 46) { P.y = 46; if (P.pitch > 0) P.pitch = -0.05; }
    // soft world bounds — the sky gently turns you back
    if (Math.abs(P.x) > 70) P.yaw += dt * 1.2 * Math.sign(P.x) * (Math.sin(P.yaw) > 0 === P.x > 0 ? -1 : 1);
    if (P.z > 20) P.yaw += dt * 1.5;
    if (P.z < -195) P.yaw += dt * 1.5;

    // SOLID islands: sphere push-out + a soft bounce (never through them)
    G.bumpCd = Math.max(0, G.bumpCd - dt);
    const canLand = G.got >= rings.length;
    for (const isle of ISLES) {
      const eligible = canLand && isle.g === pad;
      const dx = P.x - isle.x, dy = P.y - isle.y, dz = P.z - isle.z;
      const d = Math.hypot(dx, dy, dz);
      const R = isle.r + 1.2;
      if (d >= R) continue;
      if (eligible) { land(); return; }              // touch the rainbow island → soft landing
      const n = d || 0.001;
      P.x = isle.x + (dx / n) * R;                    // push out along the normal…
      P.y = isle.y + (dy / n) * R;
      P.z = isle.z + (dz / n) * R;
      const away = Math.atan2(-(dx / n), -(dz / n));  // …and swing the nose away
      let diff = away - P.yaw;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      P.yaw += diff * 0.35;
      P.pitch = Math.max(P.pitch, dy > 0 ? 0.25 : P.pitch);
      P.sp = Math.max(F.min, P.sp * 0.55);
      G.shake = 0.45;
      if (G.bumpCd <= 0) {
        G.bumpCd = 1.6;
        K.sfx.pop();
        K.toast(K.tr('Boing! Soft bounce 💙', '¡Boing! Rebote suave 💙'), 1400);
      }
    }

    // ring pickups (through the middle!)
    for (const r of rings) {
      if (r.userData.got) continue;
      if (Math.hypot(P.x - r.position.x, P.y - r.position.y, P.z - r.position.z) < 2.9) {
        r.userData.got = true; G.got++; G.stars++;
        K.save('stars', G.stars);
        r.userData.torus.material = new THREE.MeshLambertMaterial({ color: 0x69db7c, emissive: 0x1a5d2a });
        r.userData.star.material.opacity = 0.25;
        r.userData.glow.material.opacity = 0.3;
        burstAt(r.position.x, r.position.y, r.position.z);
        $('fRings').textContent = '⭐ ' + G.got + '/' + rings.length;
        K.sfx.yes(); K.recordEvent('ring', G.got);
        if (G.got >= rings.length) {
          K.sfx.star();
          K.say(K.tr('All the stars! Fly to the rainbow island to rest, or keep soaring!',
                     '¡Todas las estrellas! Vuela a la isla arcoíris a descansar, ¡o sigue volando!'));
          K.toast(K.tr('🌈 All stars! The rainbow island is waiting…', '🌈 ¡Todas! La isla arcoíris te espera…'), 3600);
        } else {
          K.say(K.tr(`Star ${G.got}!`, `¡Estrella ${G.got}!`));
        }
      }
    }
  }

  function land() {
    G.flying = false; G.landT = 0;
    G.course++;
    K.save('course', G.course);
    P.x = pad.position.x; P.z = pad.position.z + 2;
    P.y = pad.position.y + 9 * 0.28 + 1.1;
    P.pitch = 0; P.roll = 0; P.sp = F.cruise;
    K.sfx.star();
    K.recordEvent('land', G.course);
    K.streakBump();
    K.say(K.tr('What a wonderful flight! Rest your ears, then push up to fly again!',
               '¡Qué vuelo tan maravilloso! Descansa tus orejas y empuja hacia arriba para volar otra vez.'));
    K.toast(K.tr('🌈 Soft landing! Push ⬆️ to take off', '🌈 ¡Aterrizaje suave! Empuja ⬆️ para despegar'), 4200);
  }

  function takeOff() {
    G.flying = true;
    P.yaw = Math.PI; P.pitch = 0.3; P.sp = F.cruise; P.y += 2;
    spawnRings();
    K.sfx.yes();
    K.say(K.tr('Up, up and away!', '¡Arriba, arriba y a volar!'));
  }

  function trumpet() {
    K.sfx.star();
    K.recordEvent('trumpet', 0);
    K.say(K.tr('Toot toot!', '¡Tut tuut!'));
    // nearby birds twirl with joy
    for (const b of birds) {
      if (Math.hypot(P.x - b.position.x, P.z - b.position.z) < 30) {
        b.userData.joy = 1.2;
      }
    }
  }

  /* ---------- per-frame ---------- */
  let t = 0, blinkT = 2.5, camP = null, fovNow = 60;
  function frame(dt) {
    dt = dt || 0; t += dt;
    if (K.replaying) {
      const pose = K.replayPose(dt);
      if (pose) { P.x = pose.x; P.z = pose.z; P.yaw = pose.ry; }
    } else fly(dt);

    // Nilu pose: bank into the turn, nose follows the pitch
    nilu.position.set(P.x, P.y, P.z);
    nilu.rotation.set(0, 0, 0);
    nilu.rotateY(P.yaw + Math.PI);
    nilu.rotateX(-P.pitch * 0.85);
    nilu.rotateZ(-P.roll * 0.9);
    // BIG ear flapping — harder when climbing, lazy when gliding
    const climb = Math.max(0, P.pitch);
    const flapSpeed = G.flying ? (5.5 + climb * 7 + (P.sp - F.cruise) * 0.25) : 1.2;
    const flap = Math.sin(t * flapSpeed) * (G.flying ? 0.45 + climb * 0.35 : 0.12);
    earL.rotation.z = 0.25 + flap;
    earR.rotation.z = -0.25 - flap;
    trunk.rotation.x = 1.15 + Math.sin(t * 2.2) * 0.08 + P.pitch * 0.3;
    for (let i = 0; i < legs.length; i++)             // legs trail in the wind
      legs[i].rotation.x = (G.flying ? 0.35 + P.sp * 0.02 : 0) + Math.sin(t * 3 + i) * 0.1;
    tail.rotation.x = -0.8 + Math.sin(t * 2.6) * 0.15;
    blinkT -= dt;                                     // blink!
    const blink = blinkT < 0.12 ? 0.12 : 1;
    for (const e of eyes) e.scale.y = blink;
    if (blinkT <= 0) blinkT = 2 + Math.random() * 3;

    // chase camera: smoothed follow, banks with Nilu, FOV opens with speed
    const back = 11.5, up = 3.6;
    const ideal = {
      x: P.x + Math.sin(P.yaw) * back * Math.cos(P.pitch * 0.5),
      y: P.y + up - Math.sin(P.pitch) * 3.5,
      z: P.z + Math.cos(P.yaw) * back * Math.cos(P.pitch * 0.5),
    };
    if (!camP) camP = { ...ideal };
    const ck = 1 - Math.exp(-dt * 4.2);
    camP.x += (ideal.x - camP.x) * ck;
    camP.y += (ideal.y - camP.y) * ck;
    camP.z += (ideal.z - camP.z) * ck;
    G.shake = Math.max(0, G.shake - dt * 1.6);
    camera.position.set(
      camP.x + (Math.random() - 0.5) * G.shake,
      camP.y + (Math.random() - 0.5) * G.shake,
      camP.z + (Math.random() - 0.5) * G.shake);
    const ahead = 5;
    camera.lookAt(P.x - Math.sin(P.yaw) * ahead * 0.6, P.y + 1.6 + P.pitch * 2.5, P.z - Math.cos(P.yaw) * ahead * 0.6);
    camera.rotateZ(-P.roll * 0.22);
    const fovT = 58 + Math.max(0, P.sp - F.cruise) * 1.4;
    if (Math.abs(fovT - fovNow) > 0.1) {
      fovNow += (fovT - fovNow) * Math.min(1, dt * 3);
      camera.fov = fovNow; camera.updateProjectionMatrix();
    }

    // Nilu's blob shadow on the sea (or a lawn below her)
    let shY = OCEAN_Y + 0.15, shR = 1.5;
    for (const isle of ISLES) {
      if (Math.hypot(P.x - isle.x, P.z - isle.z) < isle.r * 0.8 && P.y > isle.topY) { shY = isle.topY + 0.1; break; }
    }
    shadowBlob.position.set(P.x, shY, P.z);
    const drop = Math.max(2, P.y - shY);
    shadowBlob.material.opacity = Math.max(0.04, 0.22 - drop * 0.004);
    shadowBlob.scale.setScalar(Math.max(0.5, 1.3 - drop * 0.012) * shR);

    // wind streaks fade in with speed and stream past
    const wind = G.flying ? Math.max(0, (P.sp - 9.5) / 7) : 0;
    for (const s of streaks) {
      s.off[2] += dt * P.sp * 2.2;
      if (s.off[2] > 6) { s.off[0] = (Math.random() - 0.5) * 16; s.off[1] = (Math.random() - 0.5) * 9; s.off[2] = -26; }
      s.m.position.set(
        P.x - Math.sin(P.yaw) * -s.off[2] + Math.cos(P.yaw) * s.off[0],
        P.y + s.off[1],
        P.z - Math.cos(P.yaw) * -s.off[2] - Math.sin(P.yaw) * s.off[0]);
      s.m.rotation.y = P.yaw;
      s.m.material.opacity = wind * 0.5;
    }

    // ring collect bursts
    for (let i = bursts.length - 1; i >= 0; i--) {
      const b = bursts[i];
      b.life -= dt;
      if (b.life <= 0) { scene.remove(b.pts); bursts.splice(i, 1); continue; }
      const arr = b.pts.geometry.attributes.position;
      for (let j = 0; j < b.vel.length; j++) {
        arr.setX(j, arr.getX(j) + b.vel[j][0] * dt);
        arr.setY(j, arr.getY(j) + (b.vel[j][1] -= dt * 6) * dt);
        arr.setZ(j, arr.getZ(j) + b.vel[j][2] * dt);
      }
      arr.needsUpdate = true;
      b.pts.material.opacity = b.life / 0.9;
    }

    // world life
    if (ocean) { ocean.material.map.offset.x += dt * 0.006; ocean.material.map.offset.y += dt * 0.004; }
    for (const tex of falls) tex.offset.y += dt * 0.9;
    for (const c of clouds) c.position.x += Math.sin(t * 0.1 + c.position.z) * dt * 0.4;
    for (const b of birds) {
      b.userData.t += dt;
      b.position.y += Math.sin(b.userData.t * 2) * dt * 1.2;
      if (b.userData.joy > 0) {
        b.userData.joy -= dt;
        b.position.y += dt * 3;
        b.material.rotation += dt * 6;
      } else b.material.rotation *= 0.9;
    }
    for (const r of rings) {
      r.rotation.y += dt * (r.userData.got ? 0.2 : 1.2);
      const pulse = r.userData.got ? 1 : 1 + Math.sin(t * 2.4 + r.position.x) * 0.045;
      r.userData.torus.scale.setScalar(pulse);
      r.userData.star.position.y = 3.2 + Math.sin(t * 2 + r.position.x) * 0.25;
    }
    // gentle hint: a little star floats toward the nearest un-got ring
    const next = rings.find((r) => !r.userData.got);
    if (next && G.flying) {
      hintArrow.visible = true;
      const dx = next.position.x - P.x, dy = next.position.y - P.y, dz = next.position.z - P.z;
      const d = Math.hypot(dx, dy, dz) || 1;
      hintArrow.position.set(P.x + (dx / d) * 5, P.y + 1.5 + (dy / d) * 2, P.z + (dz / d) * 5);
      hintArrow.material.opacity = 0.55 + Math.sin(t * 3) * 0.25;
    } else hintArrow.visible = false;

    renderer.render(scene, camera);
  }

  /* ---------- boot ---------- */
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xcfe9ff, 70, 260);
  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 800);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  $('kStage').appendChild(renderer.domElement);
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  buildWorld();
  nilu = buildNilu(); scene.add(nilu);
  window.FL = { P, G, rings: () => rings, land, takeOff, trumpet, ISLES };   // debug/test handle
  frame(0);

  K.init({
    slug: 'flying',
    name: "Aaria's Flying Elephant",
    emoji: '🐘',
    accent: '#4dabf7',
    tagline: 'fly Nilu through the sky — big ears, star rings, soft landings!',
    taglineEs: 'vuela con Nilu por el cielo — ¡orejotas, anillos de estrellas y aterrizajes suaves!',
    emojis: ['🐘', '☁️', '⭐', '🌈', '🕊️'],
    howTo: [
      ['🕹️', 'Tilt the stick to bank and turn — like a real flyer'],
      ['⬇️', 'Dive to zoom faster, climb to float slower'],
      ['⭐', 'Glide through the glowing star rings'],
      ['🏝️', 'Islands are solid — bump one and you bounce off, softly'],
      ['🌈', 'All stars? Land gently on the rainbow island'],
    ],
    howToEs: [
      ['🕹️', 'Inclina la palanca para girar — como un aviador de verdad'],
      ['⬇️', 'Baja en picada para ir rápido, sube para flotar despacio'],
      ['⭐', 'Pasa por los anillos de estrellas que brillan'],
      ['🏝️', 'Las islas son sólidas — si chocas, rebotas suavecito'],
      ['🌈', '¿Todas las estrellas? Aterriza en la isla arcoíris'],
    ],
    anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvY2xxeGdlZGhkZ3NseG5vdnh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzA3NzUsImV4cCI6MjA4NzQwNjc3NX0.824zjMOHfPyMXBm5WgvArI-ZzQJgYzddskm7-5y-PSM',
    actions: [
      { emoji: '🎺', label: 'Trumpet', labelEs: 'Trompeta', title: 'Say hello to the sky!', titleEs: '¡Saluda al cielo!', onTap: trumpet },
    ],
    playerPos: () => ({ x: P.x, z: P.z, ry: P.yaw }),
    replayableState: {
      get: () => JSON.parse(JSON.stringify({ P, got: G.got, course: G.course, flying: G.flying })),
      set: (s) => { Object.assign(P, s.P); G.got = s.got; G.course = s.course; G.flying = s.flying; },
    },
    onStart() {
      G.stars = K.load('stars', 0);
      G.course = K.load('course', 0);
      spawnRings();
      K.say(K.tr('Flap those big ears, Nilu! Fly through the star rings!',
                 '¡Aletea esas orejotas, Nilu! ¡Vuela por los anillos de estrellas!'));
    },
    onPause() {},
    onFrame: frame,
    onReplayEvent(ev) {
      if (ev.kind === 'ring') { K.toast('⭐!'); K.sfx.yes(); }
      else if (ev.kind === 'land') { K.toast(K.tr('🌈 Soft landing!', '🌈 ¡Aterrizaje suave!')); K.sfx.star(); }
      else if (ev.kind === 'trumpet') { K.toast('🎺'); }
    },
  });
})();
</script>
