<!DOCTYPE html>
<html>
<head>
    <title>Authenticating...</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p>Securing your inclusive world...</p>
    <script>
        // LANDING PAD: The Ultimate Bypass
        (function() {
            const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#', '?'));
            const userId = urlParams.get('userId');
            const secret = urlParams.get('secret');
            
            if (userId && secret) {
                const msg = "🚀 LANDING PAD: Keys Captured and Secured!";
                console.log(msg);
                localStorage.setItem('auth_capture', JSON.stringify({ 
                    userId, 
                    secret, 
                    ts: new Date().toISOString(),
                    source: 'Landing Pad'
                }));
                alert(msg);
            } else {
                console.log("LANDING PAD: No keys found, proceeding home...");
            }
            
            // Go Home with a tiny safety delay to ensure storage commit
            setTimeout(() => {
                window.location.href = '/';
            }, 500);
        })();
    </script>
</body>
</html>
