<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aaria's Grocery Store | Aaria's Blue Elephant</title>
<!-- © 2026 Aaria's Blue Elephant · aariasblueelephant.org · Built by Aaria and her Friends 💙
     A life-skills shopping game: bring a picture list, find the food, wait your turn,
     pay and bag. The store is friendly and predictable — no timers, no mistakes. -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<link rel="stylesheet" href="../gamekit/kit.css">
<style>
  /* game-specific bits only — everything else comes from the kit */
  #gList {
    position: fixed; top: max(10px, env(safe-area-inset-top)); left: max(10px, env(safe-area-inset-left));
    z-index: 45; background: var(--k-card); border-radius: 16px; padding: 10px 12px;
    box-shadow: 0 4px 12px rgba(40,40,90,.18); border: 2px solid var(--k-accent);
    display: none; max-width: 44vw;
  }
  #gList h3 { margin: 0 0 6px; font-size: 13px; letter-spacing: .4px; }
  .gItem {
    display: inline-flex; align-items: center; justify-content: center; gap: 2px;
    font-size: 24px; margin: 2px 6px 2px 0; width: 34px; height: 34px;
  }
  .gItem.got { opacity: .5; filter: grayscale(.4); }
  .gItem.hidden {
    font-size: 15px; color: var(--k-accent); background: rgba(245,158,11,.15);
    border-radius: 8px; font-weight: 900;
  }
  .gItem.peek { background: rgba(255,224,102,.5); border-radius: 8px; animation: gPeekPulse 1s ease-in-out infinite; }
  @keyframes gPeekPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .gItem .tick { font-size: 15px; }
  #gLevel {
    position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 45; background: var(--k-card); border-radius: 999px; padding: 4px 14px;
    font-weight: 900; font-size: 13px; box-shadow: 0 3px 8px rgba(40,40,90,.16); display: none;
  }
  #gHint {
    position: fixed; right: max(16px, env(safe-area-inset-right)); bottom: calc(max(16px, env(safe-area-inset-bottom)) + 236px);
    z-index: 40; width: 74px; height: 74px; border-radius: 50%; border: 0; cursor: pointer;
    background: linear-gradient(180deg,#ffe066,#ffb703); font: inherit; font-size: 26px; font-weight: 900;
    box-shadow: 0 5px 12px rgba(40,40,90,.22); display: none; flex-direction: column; align-items: center; justify-content: center;
    animation: gHintPop .4s ease;
  }
  #gHint span.gLbl { font-size: 10px; font-weight: 800; }
  #gHint:active { transform: scale(.9); }
  @keyframes gHintPop { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) { .gItem.peek, #gHint { animation: none; } }
  /* real-money teaching moment at pay time — name + value, no matching/no math */
  .gMoneyCoin {
    width: var(--sz, 76px); height: var(--sz, 76px); border-radius: 50%; border: 0; cursor: pointer;
    margin: 10px auto; display: flex; align-items: center; justify-content: center;
    font: inherit; font-weight: 900; color: var(--c2, #7c4a03);
    background: radial-gradient(circle at 35% 30%, var(--c1, #fde68a), var(--c2, #f59e0b));
    box-shadow: 0 5px 0 var(--c2, #b45309);
  }
  .gMoneyCoin span { font-size: calc(var(--sz, 76px) * .34); }
  .gMoneyCoin:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--c2, #b45309); }
  .gMoneyBill {
    width: 168px; height: 82px; border-radius: 10px; border: 3px solid rgba(255,255,255,.6); cursor: pointer;
    margin: 10px auto; display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
    font: inherit; font-weight: 900; color: #fff; font-size: 26px;
    background: linear-gradient(135deg, var(--bc, #3f9142), var(--bd, #2c6b31));
    box-shadow: 0 5px 0 var(--bd, #21532a);
  }
  .gMoneyBill:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--bd, #21532a); }
  .gMoneyBill .gBillIco { font-size: 30px; }
  #gPayBubble {
    background: #fff8e1; border: 2px dashed #f59e0b; border-radius: 14px;
    padding: 10px 14px; margin: 10px 0; font-size: 16px; font-weight: 700;
  }
  #gPurse {
    display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;
    background: linear-gradient(180deg,#fce3ef,#f8c6dd); border-radius: 20px; padding: 16px 12px; margin: 10px 0;
    box-shadow: inset 0 3px 8px rgba(150,60,110,.18);
  }
  #gPurse .gMoneyCoin { margin: 0; }
  #gPurse .gMoneyBill { margin: 0; width: 118px; height: 60px; font-size: 20px; padding: 0 10px; }
  #gPurse .gMoneyBill .gBillIco { font-size: 22px; }
  .gPurseItem:disabled { cursor: default; }
  .gScanItem {
    width: 84px; height: 84px; border-radius: 20px; border: 0; cursor: pointer; margin: 6px;
    font: inherit; font-size: 44px; background: #fff;
    box-shadow: 0 4px 10px rgba(40,40,90,.2);
  }
  .gScanItem:active { transform: scale(.9); }
  .gScanItem.done { opacity: .3; transform: scale(.8); box-shadow: none; cursor: default; }
  #gBreath {
    width: 110px; height: 110px; border-radius: 50%; margin: 10px auto;
    background: radial-gradient(circle at 40% 35%, #bfdbfe, #3b82f6);
    animation: gBreathe 4s ease-in-out infinite; box-shadow: 0 6px 18px rgba(59,130,246,.4);
  }
  @keyframes gBreathe { 0%,100% { transform: scale(.72); } 50% { transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) { #gBreath { animation: none; } }
  .gStamps { font-size: 30px; letter-spacing: 4px; margin: 8px 0; }
</style>
</head>
<body>
<div id="kStage"></div>

<!-- picture list card (the heart of the game) -->
<div id="gList"><h3>📋 My List</h3><div id="gListItems"></div></div>
<div id="gLevel"></div>
<button id="gHint" title="Get a hint for where to find your next food">💡<span class="gLbl">Hint</span></button>

<script src="lib/three.min.js"></script>
<script src="../gamekit/kit.js"></script>
<script>
(function () {
  "use strict";
  const K = window.ABEKit;

  /* ---------- the food on the shelves ---------- */
  const FOODS = [
    { id: "apple",  emoji: "🍎", name: "an apple" },
    { id: "banana", emoji: "🍌", name: "a banana" },
    { id: "carrot", emoji: "🥕", name: "a carrot" },
    { id: "tomato", emoji: "🍅", name: "a tomato" },
    { id: "milk",   emoji: "🥛", name: "some milk" },
    { id: "cheese", emoji: "🧀", name: "some cheese" },
    { id: "eggs",   emoji: "🥚", name: "some eggs" },
    { id: "juice",  emoji: "🧃", name: "a juice box" },
    { id: "bread",  emoji: "🍞", name: "some bread" },
    { id: "cookie", emoji: "🍪", name: "a cookie" },
    { id: "orange", emoji: "🍊", name: "an orange" },
    { id: "corn",   emoji: "🌽", name: "some corn" },
  ];
  const MAX_LEVEL = 7;                 // one level per denomination taught (7 coins & bills)
  const MAX_LIST = 6;                  // the shopping list itself never grows past 6 of the 12 foods
  const levelSize = (lvl) => Math.min(lvl, MAX_LIST);
  const REVEAL_BASE = 2.4, REVEAL_PER_ITEM = 1.7;   // seconds to look at the list before it hides
  const HINT_DELAY = 14;               // seconds of quiet shopping before the Hint button appears

  /* ---------- real US money, taught one denomination per level — names & values only, no math ---------- */
  const DENOMS = [
    { id: "penny",   name: "Penny",           value: 1,    kind: "coin", sz: 50, c1: "#e8a06b", c2: "#a85a2c", desc: "the little copper one", fact: "A penny means 1 cent! It's the copper-colored one. 🟤" },
    { id: "nickel",  name: "Nickel",          value: 5,    kind: "coin", sz: 58, c1: "#e7e9ee", c2: "#9aa0ab", desc: "the chunky silver one", fact: "A nickel means 5 cents! 🪙" },
    { id: "dime",    name: "Dime",            value: 10,   kind: "coin", sz: 44, c1: "#eef0f3", c2: "#a7acb6", desc: "the tiniest one", fact: "A dime means 10 cents! It's our smallest coin. ⚪" },
    { id: "quarter", name: "Quarter",         value: 25,   kind: "coin", sz: 66, c1: "#eef0f3", c2: "#9aa0ab", desc: "the biggest one", fact: "A quarter means 25 cents! It's our biggest coin. ⚪" },
    { id: "dollar",  name: "Dollar bill",     value: 100,  kind: "bill", bc: "#3f9142", bd: "#2c6b31", desc: "the one with a 1", fact: "A dollar bill means 100 cents — that's $1! 💵" },
    { id: "five",    name: "Five-dollar bill", value: 500,  kind: "bill", bc: "#2f7a6b", bd: "#20564b", desc: "the one with a 5", fact: "A five-dollar bill means $5! 💵" },
    { id: "ten",     name: "Ten-dollar bill",  value: 1000, kind: "bill", bc: "#3a6ea8", bd: "#294d78", desc: "the one with a 10", fact: "A ten-dollar bill means $10! 💵" },
  ];
  const fmtMoney = (cents) => cents < 100 ? `${cents}¢` : `$${cents / 100}`;

  /* ---------- three.js scene ---------- */
  let scene, camera, renderer, player, cart, cashier, npc, beacon, hintBeacon, grabRing;
  const stands = [];           // { food, mesh, x, z }
  const colliders = [];        // AABBs {x1,z1,x2,z2}
  const cartItems = [];        // sprites riding in the cart
  const W = 15, D = 12;        // store half-extents

  function emojiTexture(emoji, size) {
    const c = document.createElement("canvas"); c.width = c.height = size || 128;
    const g = c.getContext("2d");
    g.font = (c.width * 0.8) + "px serif";
    g.textAlign = "center"; g.textBaseline = "middle";
    g.fillText(emoji, c.width / 2, c.height / 2 + c.width * 0.05);
    const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
  }
  function emojiSprite(emoji, scale) {
    const m = new THREE.SpriteMaterial({ map: emojiTexture(emoji), transparent: true });
    const s = new THREE.Sprite(m); s.scale.set(scale || 1.4, scale || 1.4, 1); return s;
  }
  function box(w, h, d, color, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ color }));
    m.position.set(x, y, z); scene.add(m); return m;
  }

  function buildElephant(color) {
    const g = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color });
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 18, 14), mat);
    body.position.y = 0.55; body.scale.y = 1.1; g.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 18, 14), mat);
    head.position.set(0, 1.35, 0.12); g.add(head);
    for (const s of [-1, 1]) {
      const ear = new THREE.Mesh(new THREE.SphereGeometry(0.26, 12, 10), mat);
      ear.position.set(0.42 * s, 1.45, -0.05); ear.scale.set(0.5, 1, 0.9); g.add(ear);
    }
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.13, 0.55, 10), mat);
    trunk.position.set(0, 1.1, 0.42); trunk.rotation.x = 0.9; g.add(trunk);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x2a2a3a });
    for (const s of [-1, 1]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), eyeMat);
      eye.position.set(0.16 * s, 1.45, 0.44); g.add(eye);
    }
    return g;
  }

  function buildCart() {
    const g = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: 0x9aa7b8 });
    const basket = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.5, 1.2), mat);
    basket.position.y = 0.75; g.add(basket);
    const inner = new THREE.Mesh(new THREE.BoxGeometry(0.74, 0.5, 1.04), new THREE.MeshLambertMaterial({ color: 0xf6f8fb }));
    inner.position.y = 0.82; g.add(inner);
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x3a3a5a });
    for (const [sx, sz] of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 8), wheelMat);
      w.position.set(0.36 * sx, 0.11, 0.48 * sz); g.add(w);
    }
    const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.95, 8), mat);
    handle.rotation.z = Math.PI / 2; handle.position.set(0, 1.25, -0.62); g.add(handle);
    g.visible = false;
    return g;
  }

  function buildStore() {
    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const sun = new THREE.DirectionalLight(0xfff4e0, 0.55); sun.position.set(6, 12, 4); scene.add(sun);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(W * 2, D * 2),
      new THREE.MeshLambertMaterial({ color: 0xffe8b8 }));
    floor.rotation.x = -Math.PI / 2; scene.add(floor);
    // rainbow floor accent stripe, echoing the site's rainbow-title branding
    const stripeColors = [0xff6b8b, 0xffa94d, 0xffd43b, 0x69db7c, 0x4dabf7, 0xb197fc];
    stripeColors.forEach((c, i) => {
      const s = new THREE.Mesh(new THREE.PlaneGeometry(W * 2, 0.5),
        new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.55 }));
      s.rotation.x = -Math.PI / 2; s.position.set(0, 0.005, -D + 0.3 + i * 0.5); scene.add(s);
    });

    // bright candy-colored walls
    box(W * 2, 3, 0.4, 0xff9ecb, 0, 1.5, -D);          // back
    box(0.4, 3, D * 2, 0x7ee8b0, -W, 1.5, 0);          // left
    box(0.4, 3, D * 2, 0x9ecbff, W, 1.5, 0);           // right
    // front is a low ledge with a doorway gap, so the camera sees over it
    box(W - 4, 1.2, 0.4, 0xffc978, -(W / 2 + 2), 0.6, D);
    box(W - 4, 1.2, 0.4, 0xffc978, W / 2 + 2, 0.6, D);
    const mat = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.4),
      new THREE.MeshLambertMaterial({ color: 0x5fd88a }));
    mat.rotation.x = -Math.PI / 2; mat.position.set(0, 0.01, D - 1.4); scene.add(mat);
    const sign = emojiSprite("🛒", 2.4); sign.position.set(0, 3.6, -D + 0.6); scene.add(sign);

    // three shelf rows, four foods each — shelves are SEGMENTED (one block per food)
    // with real gaps between them, so the child can walk between rows, not just
    // along the front of one. A continuous full-width shelf trapped players behind
    // the nearest row and made 2/3 of the list unreachable — this fixes that.
    const shelfZ = [-7, -2.5, 2];
    const standX = [-8, -3.5, 1, 5.5];
    const shelfColors = [0xff8fb3, 0x7fe09a, 0xffcf6b];
    const SEG_W = 1.5, SEG_D = 1.1;   // narrow segments, wide gaps — easy to steer through even without careful aim
    let fi = 0;
    shelfZ.forEach((z, row) => {
      standX.forEach((x) => {
        box(SEG_W, 1.4, SEG_D, shelfColors[row], x, 0.7, z);
        box(SEG_W + 0.2, 0.18, SEG_D + 0.2, 0xffffff, x, 1.45, z); // white shelf top rim
        colliders.push({ x1: x - SEG_W / 2, z1: z - SEG_D / 2, x2: x + SEG_W / 2, z2: z + SEG_D / 2 });
        const food = FOODS[fi++];
        const s = emojiSprite(food.emoji, 1.4);
        s.position.set(x, 2.15, z + 0.15); scene.add(s);
        stands.push({ food, sprite: s, x, z: z + 1.0, baseY: 2.15 });
      });
    });

    // checkout: counter + cashier on the east side near the door
    box(1.4, 1.1, 4.2, 0x5fa8f0, 11.5, 0.55, 7);
    colliders.push({ x1: 10.7, z1: 4.8, x2: 12.3, z2: 9.2 });
    const till = emojiSprite("🧾", 1.0); till.position.set(11.5, 1.9, 5.8); scene.add(till);
    cashier = buildElephant(0x9b8ce8); cashier.position.set(13.2, 0, 7);
    cashier.rotation.y = -Math.PI / 2; scene.add(cashier);

    beacon = emojiSprite("⬇️", 1.6); beacon.position.set(9.6, 3.4, 7);
    beacon.visible = false; scene.add(beacon);

    hintBeacon = emojiSprite("💡", 1.5);
    hintBeacon.visible = false; scene.add(hintBeacon);

    // grab preview: a soft ring under whichever stand ✋ Grab would take right now
    grabRing = new THREE.Mesh(new THREE.RingGeometry(0.7, 0.95, 40),
      new THREE.MeshBasicMaterial({ color: 0x34d399, transparent: true, opacity: 0.85, side: THREE.DoubleSide }));
    grabRing.rotation.x = -Math.PI / 2; grabRing.position.y = 0.03;
    grabRing.visible = false; scene.add(grabRing);

    // one friendly shopper who pays ahead of us (skipped in Calm Mode)
    npc = buildElephant(0xf0a8b8); npc.position.set(9.6, 0, 7);
    npc.rotation.y = Math.PI / 2; npc.visible = false; scene.add(npc);
  }

  /* ---------- game state ---------- */
  const G = {
    phase: "shop",           // reveal → shop → line → scan → pay → bag → done
    list: [], got: [],       // food ids
    peeked: [],              // ids revealed early via Hint (memory game: list hides once shopping starts)
    level: 1,
    trips: 0,
    walkTapTarget: null,     // stand tapped — auto-grab on arrival
    lineT: 0, breaths: 0,
    revealT: 0, revealDur: 0,
    hintTimer: 0, hintShown: false,
    panelOpen: false,
    grabPreview: null,       // the stand ✋ Grab would take right now (highlighted in-world)
  };
  const P = { x: 0, z: 9, ry: Math.PI }; // player pose (spawn on the door mat)

  function snapshot() {
    return JSON.parse(JSON.stringify({ list: G.list, got: G.got, peeked: G.peeked, level: G.level, phase: G.phase, x: P.x, z: P.z }));
  }
  function restore(s) {
    G.list = s.list; G.got = s.got; G.peeked = s.peeked || []; G.level = s.level || 1;
    G.phase = s.phase === "reveal" ? "shop" : s.phase; // a saved mid-reveal replay just resumes shopping
    P.x = s.x; P.z = s.z;
    stands.forEach((st) => { st.sprite.material.opacity = G.got.includes(st.food.id) ? 0.35 : 1; });
    closePanel(); renderList(); refreshPhase();
  }

  function newList() {
    const pool = FOODS.slice();
    const size = levelSize(G.level);
    G.list = [];
    while (G.list.length < size) {
      const i = Math.floor(Math.random() * pool.length);
      G.list.push(pool.splice(i, 1)[0].id);
    }
    // food of the day — a different daily special is on every list (come back tomorrow!)
    const special = FOODS[Math.floor(Date.now() / 864e5) % FOODS.length];
    if (!G.list.includes(special.id)) G.list[0] = special.id;
    G.got = []; G.peeked = [];
    G.hintTimer = 0; G.hintShown = false;
    document.getElementById("gHint").style.display = "none";
    hintBeacon.visible = false;
    cartItems.forEach((s) => cart.remove(s)); cartItems.length = 0;
    stands.forEach((st) => { st.sprite.material.opacity = 1; });

    // memory game: show the list once, read it aloud, then hide it while shopping
    G.phase = "reveal";
    G.revealT = 0; G.revealDur = REVEAL_BASE + REVEAL_PER_ITEM * size;
    renderList(); refreshPhase();
    document.getElementById("gLevel").textContent = `Level ${G.level} · Remember ${size} ${size === 1 ? "thing" : "things"}!`;
    document.getElementById("gLevel").style.display = "block";
    K.say("Look and remember! " + G.list.map((id) => foodById(id).name).join(", "));
    K.toast(`⭐ Today's special: ${special.emoji}!`, 3000);
  }

  function endReveal() {
    G.phase = "shop";
    document.getElementById("gLevel").style.display = "none";
    renderList(); refreshPhase();
    if (K.calm()) {
      K.say("Now find them! Your list is right there to help you.");
      K.toast("Go find your list — it's right there 📋💙", 3200);
    } else {
      K.say("Now find them! You can do it from memory. 🧠");
      K.toast("Go find your list from memory! 🧠", 3200);
    }
  }
  const foodById = (id) => FOODS.find((f) => f.id === id);

  function renderList() {
    const el = document.getElementById("gListItems");
    // Calm Mode removes the memory pressure entirely: the list stays visible
    const showAll = G.phase === "reveal" || K.calm();
    el.innerHTML = G.list.map((id) => {
      const got = G.got.includes(id);
      const peeked = G.peeked.includes(id);
      if (got) return `<span class="gItem got">${foodById(id).emoji}<span class="tick">✅</span></span>`;
      if (showAll || peeked) return `<span class="gItem ${peeked ? "peek" : ""}">${foodById(id).emoji}</span>`;
      return `<span class="gItem hidden">❓</span>`;
    }).join("");
  }

  function refreshPhase() {
    const remaining = G.list.filter((id) => !G.got.includes(id));
    beacon.visible = G.phase === "shop" && remaining.length === 0;
    if (G.phase === "reveal") K.chip("Look and remember! 👀🧠");
    else if (G.phase === "shop") {
      K.chip(remaining.length
        ? (K.calm()
            ? "Find: " + remaining.map((id) => foodById(id).emoji).join(" ")
            : `Find ${remaining.length} more from memory! 🧠`)
        : "All done! Go to the checkout ➡️ 🧾");
    } else if (G.phase === "line") K.chip("Waiting our turn 🌸");
    else if (G.phase === "scan") K.chip("Beep! Scan each food 🧾");
    else if (G.phase === "pay") K.chip("Time to pay 🪙");
    else if (G.phase === "bag") K.chip("Pop the food in the bag 🛍️");
    else if (G.phase === "done") K.chip("Great shopping trip! 🌟");
  }

  /* ---------- hint ---------- */
  function showHintButton() {
    if (G.hintShown) return;
    G.hintShown = true;
    document.getElementById("gHint").style.display = "flex";
  }
  function useHint() {
    const remaining = G.list.filter((id) => !G.got.includes(id));
    if (!remaining.length) return;
    const id = remaining.find((x) => !G.peeked.includes(x)) || remaining[0];
    if (!G.peeked.includes(id)) G.peeked.push(id);
    const st = stands.find((s) => s.food.id === id);
    if (st) {
      hintBeacon.position.set(st.x, 3.2, st.z - 0.6);
      hintBeacon.visible = true;
      clearTimeout(useHint._t);
      useHint._t = setTimeout(() => { hintBeacon.visible = false; }, 6000 * K.speed());
    }
    K.sfx.tap();
    K.say(`Let's look for ${foodById(id).name}!`);
    K.toast(`💡 It's ${foodById(id).emoji} this way!`, 3000);
    renderList();
  }

  /* ---------- grabbing ---------- */
  function nearestStand(maxDist) {
    let best = null, bd = maxDist * maxDist;
    for (const st of stands) {
      const d = (st.x - P.x) ** 2 + (st.z - P.z) ** 2;
      if (d < bd) { bd = d; best = st; }
    }
    return best;
  }

  function tryGrab(target) {
    if (G.phase !== "shop" || K.replaying) return;
    // grab the stand the child TAPPED when there is one — never a surprise neighbor
    const st = target || nearestStand(2.4);
    if (!st) { K.toast("Walk close to a food to grab it ✋"); return; }
    if (Math.hypot(st.x - P.x, st.z - P.z) > 2.6) { K.toast("Walk a little closer ✋"); return; }
    const f = st.food;
    if (G.got.includes(f.id)) { K.toast(`We already have ${f.name} ✅`); K.sfx.pop(); return; }
    if (!G.list.includes(f.id)) {
      K.sfx.no(); K.toast(`${f.emoji} isn't on our list today 💛`);
      K.say(`Not today! Let's check our list.`);
      return;
    }
    G.got.push(f.id);
    const rider = emojiSprite(f.emoji, 0.55);
    rider.position.set((cartItems.length % 2) * 0.3 - 0.15, 1.15, Math.floor(cartItems.length / 2) * 0.35 - 0.3);
    cart.add(rider); cartItems.push(rider);
    K.sfx.yes(); K.toast(`${f.emoji} In the cart!`); K.say(`We found ${f.name}!`);
    K.recordEvent("grab", FOODS.indexOf(f));
    st.sprite.material.opacity = 0.35;
    G.hintTimer = 0; hintBeacon.visible = false; // found one from memory — give the next item a fresh, quiet stretch
    renderList(); refreshPhase();
    if (G.got.length === G.list.length) {
      K.sfx.star();
      setTimeout(() => K.say("We have everything! Let's go pay."), 600);
    }
  }

  function readList() {
    // a memory game gives away nothing for free here — this only confirms
    // progress, never identities; tap Hint if you need to see what's left
    const remaining = G.list.filter((id) => !G.got.includes(id)).length;
    K.say(remaining
      ? `You remember ${remaining} more ${remaining === 1 ? "thing" : "things"}! You can do it!`
      : "We have everything! Time to pay.");
    K.toast(remaining ? `🧠 ${remaining} more from memory!` : "All done! ➡️ 🧾");
  }

  /* ---------- checkout panels (reuse kit panel styles) ---------- */
  function panel(html) {
    closePanel();
    const p = document.createElement("div");
    p.className = "kPanel"; p.id = "gPanel";
    p.innerHTML = `<div class="kPanelCard" style="text-align:center">${html}</div>`;
    document.body.appendChild(p);
    G.panelOpen = true;
    return p;
  }
  function closePanel() { const p = document.getElementById("gPanel"); if (p) p.remove(); G.panelOpen = false; }

  function startLine() {
    G.phase = "line"; refreshPhase();
    const calm = K.calm();
    npc.visible = !calm;
    G.breaths = calm ? 1 : 3;
    K.say(calm ? "One flower breath while the cashier gets ready." : "Someone is ahead of us. Let's take flower breaths while we wait.");
    const p = panel(`<h2>Waiting our turn 💙</h2>
      <p id="gBreathTxt">Smell the flower 🌸… blow the candle 🕯️</p>
      <div id="gBreath"></div>
      <p id="gBreathN" style="font-weight:900"></p>`);
    p.querySelector("#gBreathN").textContent = "🌸".repeat(G.breaths);
    G.lineT = 0;
  }

  function startScan() {
    npc.visible = false;
    G.phase = "scan"; refreshPhase();
    K.say("Beep beep! Tap each food to scan it.");
    const p = panel(`<h2>🧾 Beep! Scan the food</h2>
      <div id="gScanRow">${G.got.map((id, i) =>
        `<button class="gScanItem" data-i="${i}" title="Scan ${foodById(id).name}">${foodById(id).emoji}</button>`).join("")}</div>`);
    let left = G.got.length;
    p.querySelectorAll(".gScanItem").forEach((b) => {
      b.addEventListener("pointerdown", () => {
        if (b.classList.contains("done")) return;
        b.classList.add("done");
        K.sfx.tap(); K.recordEvent("scan", 0);
        if (--left === 0) setTimeout(startPay, 500 * K.speed());
      });
    });
  }

  function moneyBtnHTML(d, i) {
    return d.kind === "coin"
      ? `<button class="gMoneyCoin gPurseItem" data-i="${i}" title="A coin from your purse" style="--sz:${d.sz}px;--c1:${d.c1};--c2:${d.c2}"><span>${fmtMoney(d.value)}</span></button>`
      : `<button class="gMoneyBill gPurseItem" data-i="${i}" title="A bill from your purse" style="--bc:${d.bc};--bd:${d.bd}"><span class="gBillIco">🐘</span><span>${fmtMoney(d.value)}</span></button>`;
  }

  function startPay() {
    G.phase = "pay"; refreshPhase();
    // the cashier asks for one denomination (by level); the child finds it in a
    // purse holding ALL the coins (or all the bills). Wrong taps just teach the
    // other coin's name — no fail, no math, every tap says a money word out loud.
    // one new denomination per level; once every one is learned, practice them
    // all — a different coin or bill each trip, chosen at random
    const target = G.level >= MAX_LEVEL
      ? DENOMS[Math.floor(Math.random() * DENOMS.length)]
      : DENOMS[Math.min(G.level, DENOMS.length) - 1];
    const purse = DENOMS.filter((d) => d.kind === target.kind);
    const p = panel(`<h2>👛 Time to pay!</h2>
      <p>The cashier asks: <b>“One ${target.name}, please!”</b></p>
      <div id="gPurse">${purse.map((d) => moneyBtnHTML(d, DENOMS.indexOf(d))).join("")}</div>
      <div id="gPayBubble">Which one is the <b>${target.name}</b> — ${target.desc}?</div>`);
    K.say(`One ${target.name}, please! Can you find it? It's ${target.desc}.`);
    p.querySelectorAll(".gPurseItem").forEach((b) => {
      b.addEventListener("pointerdown", () => {
        if (b.disabled) return;
        const d = DENOMS[+b.dataset.i];
        if (d === target) {
          b.style.outline = "4px solid #34d399";
          p.querySelectorAll(".gPurseItem").forEach((x) => { x.disabled = true; if (x !== b) x.style.opacity = .3; });
          p.querySelector("#gPayBubble").innerHTML = `✅ ${target.fact}`;
          K.sfx.star(); K.say(`Yes! That's the ${target.name}! ${target.fact}`);
          K.recordEvent("pay", DENOMS.indexOf(target));
          setTimeout(startBag, 2600 * K.speed());
        } else {
          // a wrong tap is just another money word learned
          K.sfx.pop();
          p.querySelector("#gPayBubble").innerHTML = `That's the <b>${d.name}</b> (${fmtMoney(d.value)})! The ${target.name} is ${target.desc} 💛`;
          K.say(`That's the ${d.name}! The ${target.name} is ${target.desc}.`);
        }
      });
    });
  }

  function startBag() {
    G.phase = "bag"; refreshPhase();
    K.say("Now pop each food into the bag!");
    const p = panel(`<h2>🛍️ Bag time</h2>
      <div>${G.got.map((id, i) =>
        `<button class="gScanItem" data-i="${i}" title="Bag ${foodById(id).name}">${foodById(id).emoji}</button>`).join("")}</div>
      <p id="gBag" style="font-size:40px;min-height:52px">🛍️</p>`);
    let left = G.got.length;
    p.querySelectorAll(".gScanItem").forEach((b) => {
      b.addEventListener("pointerdown", () => {
        if (b.classList.contains("done")) return;
        b.classList.add("done"); K.sfx.pop();
        p.querySelector("#gBag").textContent = "🛍️" + "✨";
        if (--left === 0) setTimeout(finishTrip, 600 * K.speed());
      });
    });
  }

  function finishTrip() {
    G.phase = "done"; refreshPhase();
    G.trips++; K.save("trips", G.trips);
    const leveledUp = G.level < MAX_LEVEL;
    if (leveledUp) { G.level++; K.save("level", G.level); }
    cartItems.forEach((s) => cart.remove(s)); cartItems.length = 0;
    stands.forEach((st) => { st.sprite.material.opacity = 1; });
    K.sfx.star(); K.recordEvent("trip", G.trips);
    K.say("Thank you for shopping! You remembered the whole list!");
    const stamps = Math.min(G.trips, 10);
    const streak = K.streakBump();
    panel(`${streak.n > 1 ? `<div style="font-size:20px;font-weight:900">🔥 ${streak.n} days of shopping in a row!</div>` : ""}<h2>🌟 What a memory!</h2>
      <p>You remembered your list, waited your turn, paid and bagged — a whole shopping trip!</p>
      <div class="gStamps">${"⭐".repeat(stamps)}${"☆".repeat(Math.max(0, 5 - stamps))}</div>
      <p style="font-size:14px">Shopping trips: <b>${G.trips}</b>${leveledUp ? ` · Next time: <b>${levelSize(G.level)}</b> things to remember and a <b>${DENOMS[Math.min(G.level, DENOMS.length) - 1].name}</b>! 🧠💵` : " · You know every coin and bill — now we practice them all! 🏆"}</p>
      <button class="kBig" id="gAgain" title="Shop with a new list">🛒 New list!</button>`);
    document.getElementById("gAgain").addEventListener("pointerdown", () => { closePanel(); newList(); });
  }

  /* ---------- movement + camera ---------- */
  function collide(nx, nz) {
    for (const c of colliders) {
      if (nx > c.x1 - 0.45 && nx < c.x2 + 0.45 && nz > c.z1 - 0.45 && nz < c.z2 + 0.45) return true;
    }
    return false;
  }

  function movePlayer(dt) {
    let vx = 0, vz = 0;
    if (K.joy.active) { vx = K.joy.x; vz = K.joy.z; G.walkTapTarget = null; }
    else {
      const t = K.consumeWalkTarget();
      if (t) {
        const dx = t.x - P.x, dz = t.z - P.z, d = Math.hypot(dx, dz);
        if (d < 0.25) {
          K.clearWalkTarget();
          if (G.walkTapTarget) { tryGrab(G.walkTapTarget); G.walkTapTarget = null; }
        } else { vx = dx / d; vz = dz / d; }
      }
    }
    const sp = 4.6;
    if (vx || vz) {
      const m = Math.hypot(vx, vz); vx /= m; vz /= m;
      const nx = P.x + vx * sp * dt, nz = P.z + vz * sp * dt;
      if (!collide(nx, P.z)) P.x = Math.max(-W + 0.8, Math.min(W - 0.8, nx));
      if (!collide(P.x, nz)) P.z = Math.max(-D + 0.8, Math.min(D - 0.8, nz));
      P.ry = Math.atan2(vx, vz);
    }
    // reaching the checkout with a full list starts the line
    if (G.phase === "shop" && G.got.length === G.list.length && G.list.length &&
        P.x > 8.2 && P.z > 4.5 && P.z < 9.5 && !G.panelOpen) startLine();
  }

  function placeActors() {
    player.position.set(P.x, 0, P.z);
    player.rotation.y = P.ry;
    cart.visible = G.phase === "shop" || G.phase === "line";
    if (cart.visible) {
      // beside-and-ahead so the cart (and the food riding in it) is never hidden behind the child
      cart.position.set(P.x + Math.sin(P.ry) * 0.9 + Math.cos(P.ry) * 0.85, 0,
                        P.z + Math.cos(P.ry) * 0.9 - Math.sin(P.ry) * 0.85);
      cart.rotation.y = P.ry;
    }
    camera.position.set(P.x * 0.8, 7.2, P.z * 0.5 + 10.8);
    camera.lookAt(P.x, 0.9, P.z - 1.2);
  }

  /* ---------- per-frame ---------- */
  let bob = 0;
  function frame(dt) {
    dt = dt || 0;
    bob += dt;
    stands.forEach((st, i) => { st.sprite.position.y = st.baseY + Math.sin(bob * 1.6 + i) * 0.07; });
    if (beacon.visible) beacon.position.y = 3.2 + Math.abs(Math.sin(bob * 2.2)) * 0.5;

    // grab preview: mark the stand ✋ Grab would take, so it's never a surprise
    const near = (!K.replaying && G.phase === "shop" && !G.panelOpen) ? nearestStand(2.4) : null;
    if (near !== G.grabPreview) {
      if (G.grabPreview) G.grabPreview.sprite.scale.set(1.4, 1.4, 1);
      G.grabPreview = near;
    }
    if (near) {
      grabRing.visible = true;
      grabRing.position.x = near.x; grabRing.position.z = near.z - 0.55;
      const s = 1 + Math.sin(bob * 3) * 0.08;
      grabRing.scale.set(s, s, 1);
      near.sprite.scale.set(1.85, 1.85, 1);
    } else grabRing.visible = false;

    if (K.replaying) {
      if (G.panelOpen) closePanel();
      const pose = K.replayPose(dt);
      if (pose) { P.x = pose.x; P.z = pose.z; P.ry = pose.ry; }
      placeActors();
    } else {
      if (G.phase === "reveal") {
        G.revealT += dt;
        if (G.revealT >= G.revealDur) endReveal();
      } else if (G.phase === "shop" && G.list.some((id) => !G.got.includes(id))) {
        G.hintTimer += dt;
        if (G.hintTimer >= HINT_DELAY) showHintButton();
      }
      if (G.phase === "line" && G.panelOpen) {
        G.lineT += dt;
        const per = 4 * K.speed();
        if (G.lineT >= per) {
          G.lineT = 0; G.breaths--;
          K.sfx.tap();
          const n = document.getElementById("gBreathN");
          if (n) n.textContent = "🌸".repeat(Math.max(0, G.breaths));
          if (G.breaths <= 0) { closePanel(); startScan(); }
        }
      }
      movePlayer(dt);
      placeActors();
    }
    renderer.render(scene, camera);
  }

  /* ---------- tap-to-walk on the canvas ---------- */
  const ray = new THREE.Raycaster(), ndc = new THREE.Vector2(), floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  function wireTap() {
    renderer.domElement.addEventListener("pointerdown", (e) => {
      if (K.paused || K.replaying || G.panelOpen || G.phase !== "shop") return;
      ndc.x = (e.clientX / innerWidth) * 2 - 1;
      ndc.y = -(e.clientY / innerHeight) * 2 + 1;
      ray.setFromCamera(ndc, camera);
      // tapping the food itself targets that exact stand — the intuitive path
      let st = null;
      const sprHit = ray.intersectObjects(stands.map((s) => s.sprite))[0];
      if (sprHit) st = stands.find((s) => s.sprite === sprHit.object);
      const hit = new THREE.Vector3();
      if (!st) {
        // otherwise: a floor tap near a stand still means "that one"
        if (!ray.ray.intersectPlane(floorPlane, hit)) return;
        let bd = 4;
        for (const s of stands) {
          const d = Math.hypot(s.x - hit.x, s.z - hit.z);
          if (d < bd) { bd = d; st = s; }
        }
        if (st && bd >= 1.6) st = null;
      }
      let target = st ? { x: st.x, z: st.z + 1.3 } : { x: hit.x, z: hit.z };
      G.walkTapTarget = st;
      if (st && Math.hypot(st.x - P.x, st.z - P.z) < 2.4) { tryGrab(st); G.walkTapTarget = null; return; } // already close — grab right now
      K.queueWalkTo(Math.max(-W + 0.8, Math.min(W - 0.8, target.x)),
                    Math.max(-D + 0.8, Math.min(D - 0.8, target.z)));
      K.sfx.tap();
    });
  }

  /* ---------- boot ---------- */
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x7ec8ff);
  scene.fog = new THREE.Fog(0x7ec8ff, 30, 60);
  camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 100);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.getElementById("kStage").appendChild(renderer.domElement);
  addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  buildStore();
  // tiny debug/test handle, same convention as Dough Lab's window.DL
  window.GS = { G, P, stands, tryGrab: () => tryGrab(), useHint: () => useHint(), endReveal: () => endReveal() };
  player = buildElephant(0x7ec8f7); scene.add(player);
  cart = buildCart(); scene.add(cart);
  frame(0); // draw once behind the title screen

  K.init({
    slug: "grocery",
    name: "Aaria's Grocery Store",
    emoji: "🛒",
    accent: "#f59e0b",
    tagline: "bring your list, find the food, wait your turn, pay & bag!",
    emojis: ["🛒", "🍎", "🥕", "🧾", "🪙"],
    howTo: [
      ["🧠", "Look at the list, then it hides — remember!"],
      ["🕹️", "Walk with the stick or arrow keys"],
      ["👆", "Tap the floor or a food to walk there"],
      ["✋", "Stand close and tap Grab"],
      ["💡", "Stuck? A Hint button appears to help"],
      ["👛", "Find the right coin in your purse to pay!"],
      ["🧾", "Got everything? Go to the checkout!"],
    ],
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvY2xxeGdlZGhkZ3NseG5vdnh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzA3NzUsImV4cCI6MjA4NzQwNjc3NX0.824zjMOHfPyMXBm5WgvArI-ZzQJgYzddskm7-5y-PSM",
    actions: [
      { emoji: "✋", label: "Grab", title: "Pick up the food you are next to", onTap: tryGrab },
      { emoji: "📋", label: "List", title: "Hear how many things are left to remember", onTap: readList },
    ],
    playerPos: () => ({ x: P.x, z: P.z, ry: P.ry }),
    replayableState: { get: snapshot, set: restore },
    onStart() {
      G.trips = K.load("trips", 0);
      G.level = K.load("level", 1);
      document.getElementById("gList").style.display = "block";
      document.getElementById("gHint").addEventListener("pointerdown", useHint);
      newList();
      wireTap();
    },
    onPause(p) { /* frame loop already halts via kit; nothing extra to freeze */ },
    onFrame: frame,
    onReplayEvent(ev) {
      if (ev.kind === "grab") { const f = FOODS[ev.extra]; if (f) { K.toast(f.emoji + " In the cart!"); K.sfx.yes(); } }
      else if (ev.kind === "pay") { const d = DENOMS[ev.extra]; K.toast(d ? `💵 Paid with a ${d.name}!` : "💵 Paid!"); K.sfx.yes(); }
      else if (ev.kind === "trip") { K.toast("🌟 Shopping trip done!"); K.sfx.star(); }
    },
  });
})();
</script>
</body>
</html>
