name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import os, sys, time, urllib.request
      
          url = os.environ.get("DEPLOY_URL")
          if not url:
              print("DEPLOY_URL not set", file=sys.stderr)
              sys.exit(1)
      
          attempts = 12
          delay_seconds = 5
      
          for i in range(1, attempts + 1):
              try:
                  req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      code = resp.getcode()
                  print(f"Attempt {i}/{attempts}: HTTP {code}")
                  if 200 <= code < 400:
                      print("Smoke check passed")
                      sys.exit(0)
              except Exception as e:
                  print(f"Attempt {i}/{attempts} error: {e}")
              if i < attempts:
                  time.sleep(delay_seconds)
      
          print(f"Smoke check failed: {url}", file=sys.stderr)
          sys.exit(1)
          PY
