  <!-- Suppress Google Identity Services (GIS) automatic silent sign-in/One Tap -->
  <script>
    window.google_identity_auto_select = false;
    
    // [BEHIND THE SCENES] FINAL SENTRY LANDING PAD (V6.3 GREEDY)
    // Snares OAuth tokens from Query, Hash, and Fragments robustly.
    (function() {
      try {
        const url = window.location.href;
        const search = window.location.search;
        const hash = window.location.hash;
        
        // Greedy Regex Snare: Look into everything for userId and secret
        const snare = (key) => {
          const match = url.match(new RegExp('[?&#]' + key + '=([^&#]*)'));
          return match ? match[1] : null;
        };

        const userId = snare('userId');
        const secret = snare('secret');
        
        console.info(`%c [SENTRY] Arrival Analysis: Tokens Found: ${userId && secret ? 'YES ✅' : 'NO ❌'} `, 
          `background: ${userId && secret ? '#10b981' : '#f43f5e'}; color: white; font-weight: bold; border-radius: 3px;`);
        
        if (userId && secret) {
          console.info("[SENTRY] Identity Snared. Locking into SessionVault...");
          sessionStorage.setItem('abe_auth_arrival', 'true');
          sessionStorage.setItem('abe_auth_payload', JSON.stringify({ userId, secret, ts: Date.now() }));
        } else if (search.length > 1 || hash.length > 1) {
          console.warn("[SENTRY] Arrival Detected but Snare Failed. Full URL for Debug:", url);
        }
      } catch (e) {
        console.error("[SENTRY] Landing Pad Malfunction:", e);
      }
    })();
  </script>

  <div id="root">
    <!-- Inline splash screen that shows before React mounts -->
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .dark #splash-screen {
        background-color: #0f172a;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: #0ea5e9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .splash-logo {
        width: 120px;
        height: auto;
        opacity: 0.8;
      }
    </style>
    <div id="splash-screen">
      <img src="/logo.webp" alt="Aaria's Blue Elephant" class="splash-logo" onerror="this.style.display='none'">
      <div class="spinner"></div>
      <p style="font-family: sans-serif; color: #64748b; font-size: 14px;">Loading our inclusive world...</p>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Remove splash screen when React is ready
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      }
    });
  </script>
