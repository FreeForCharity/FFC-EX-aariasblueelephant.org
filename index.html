  <!-- Suppress Google Identity Services (GIS) automatic silent sign-in/One Tap -->
  <script>
    window.google_identity_auto_select = false;
    
    // [BEHIND THE SCENES] FINAL SENTRY LANDING PAD
    // Snares OAuth tokens and logs the full arrival state
    (function() {
      try {
        const search = window.location.search;
        const hash = window.location.hash;
        console.info("[8:45:41 AM] SENTRY: Arrival URL detected.", { search, hash });
        
        // Handle both standard query (?userId=...) and hash fragment (#?userId=...)
        const params = new URLSearchParams(search || (hash.includes('?') ? hash.substring(hash.indexOf('?')) : ''));
        
        const userId = params.get('userId');
        const secret = params.get('secret');
        
        if (userId && secret) {
          console.info("[8:45:41 AM] SENTRY: Tokens snared successfully.");
          sessionStorage.setItem('abe_auth_arrival', 'true');
          sessionStorage.setItem('abe_auth_payload', JSON.stringify({ userId, secret, ts: Date.now() }));
        }
      } catch (e) {
        console.error("[8:45:41 AM] SENTRY: Landing Pad error.", e);
      }
    })();
  </script>

<body>

  <div id="root">
    <!-- Inline splash screen that shows before React mounts -->
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .dark #splash-screen {
        background-color: #0f172a;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: #0ea5e9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .splash-logo {
        width: 120px;
        height: auto;
        opacity: 0.8;
      }
    </style>
    <div id="splash-screen">
      <img src="/logo.png" alt="Aaria's Blue Elephant" class="splash-logo" onerror="this.style.display='none'">
      <div class="spinner"></div>
      <p style="font-family: sans-serif; color: #64748b; font-size: 14px;">Loading our inclusive world...</p>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Remove splash screen when React is ready
    window.addEventListener('load', () => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      }
    });
  </script>
</body>
